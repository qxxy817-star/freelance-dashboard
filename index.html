<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自由职业总控台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">Freelance Command Center</p>
        <h1>自由职业总控台</h1>
        <p class="subtitle">统一管理自媒体、模特、网店三个方向的时间、现金流和下一步行动。</p>
      </div>
      <div class="week-capacity">
        <label for="weeklyCapacity">本周可用时间（小时）</label>
        <div class="capacity-input">
          <input id="weeklyCapacity" type="number" min="0" step="0.5" />
          <span>小时</span>
        </div>
      </div>
    </header>

    <main>
      <section class="dashboard-grid" aria-label="核心概览">
        <article class="card wide">
          <div class="section-title">
            <h2>本周时间投入</h2>
            <span id="weekPlanBadge" class="badge">计算中</span>
          </div>
          <div id="directionTimeCards" class="direction-time-cards"></div>
          <p id="weekPlanText" class="helper"></p>
        </article>

        <article class="card money-card">
          <h2>本月现金流</h2>
          <div class="money-list">
            <div><span>总收入</span><strong id="monthIncome">¥0</strong></div>
            <div><span>总支出</span><strong id="monthExpense">¥0</strong></div>
            <div class="net"><span>净收入</span><strong id="monthNet">¥0</strong></div>
          </div>
        </article>

        <article class="card">
          <h2>正在进行</h2>
          <div id="activeProjects" class="active-list"></div>
        </article>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>三个方向投入产出</h2>
          <p>按当前全部项目统计</p>
        </div>
        <div id="roiCards" class="roi-grid"></div>
      </section>

      <section class="workspace">
        <form id="projectForm" class="card form-card">
          <div class="section-title">
            <h2 id="formTitle">新增项目</h2>
            <button id="cancelEdit" type="button" class="ghost hidden">取消编辑</button>
          </div>
          <div class="form-grid">
            <label>项目名称<input id="name" required placeholder="例如：小红书账号起号" /></label>
            <label>所属方向<select id="direction" required></select></label>
            <label>当前状态<select id="status" required></select></label>
            <label>预计时间（小时）<input id="plannedHours" type="number" min="0" step="0.5" required /></label>
            <label>实际时间（小时）<input id="actualHours" type="number" min="0" step="0.5" required /></label>
            <label>投入金额（元）<input id="expense" type="number" min="0" step="1" required /></label>
            <label>收入（元）<input id="income" type="number" min="0" step="1" required /></label>
            <label>精力消耗<select id="energy" required></select></label>
            <label>截止日期<input id="deadline" type="date" required /></label>
            <label class="full">下一步行动<input id="nextAction" required placeholder="例如：周三前完成选题脚本" /></label>
          </div>
          <button class="primary" type="submit">保存项目</button>
        </form>

        <section class="card projects-card">
          <div class="section-title">
            <h2>项目清单</h2>
            <button id="resetDemo" type="button" class="ghost">恢复示例数据</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>项目</th><th>方向</th><th>状态</th><th>时间</th><th>金额</th><th>精力</th><th>截止</th><th>下一步</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="projectRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <footer>数据仅保存在当前浏览器本地（localStorage），无需登录。</footer>
    <script src="app.js"></script>
  </body>
</html>
